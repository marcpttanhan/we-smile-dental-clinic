  font-weight: 100 900;
  font-style: normal;
  /* block: text is invisible for ≤3 s while the font loads, then renders in Anuphan.
     Combined with the <link rel="preload"> above, the load is imperceptible on any
     reasonable connection — eliminating the system-font → Anuphan snap entirely. */
  font-display: block;
}
/* Force Anuphan as the very first family so the browser never picks a system fallback
   on the initial render. The preload ensures the font bytes are already in the cache
   by the time the first paint fires. */

/* ── Scroll-reveal ── */
/* GPU-composited: opacity + transform run on the compositor thread,
   never blocking layout or paint on the main thread. */
@keyframes ws-slide-up {
  from { opacity:0; -webkit-transform:translate3d(0,22px,0); transform:translate3d(0,22px,0); }
  to   { opacity:1; -webkit-transform:translate3d(0,0,0);    transform:translate3d(0,0,0); }
}
.sr {
  opacity:0;
  /* Hoist layer pre-emptively so iOS Safari doesn't stutter on first frame */
  -webkit-transform: translate3d(0,0,0);
  transform: translate3d(0,0,0);
  will-change: transform, opacity;
}
.sr.sr-visible {
  -webkit-animation: ws-slide-up 0.55s cubic-bezier(0.4,0,0.2,1) both;
  animation:         ws-slide-up 0.55s cubic-bezier(0.4,0,0.2,1) both;
}

/* ── Mobile: footer safe-area so floating CTA bar never overlaps copyright ── */
@media (max-width: 767px) {

/* ── Mobile scroll-reveal — CSS-transition approach (≤767px) ─────────────────
   Uses transition instead of animation so the reveal fires purely on class
   toggle (no keyframe timing or animation-fill-mode edge cases).
   Stagger delay classes are reset to 0 so all elements reveal simultaneously
   as soon as the IntersectionObserver fires — no cascade wait on phones.
   The base .sr state is still opacity:0/translateY so the reveal is felt,
   but the motion is shorter and faster than desktop for thumb-scroll pacing. */
@media (max-width: 767px) {
  .sr {
    opacity: 0;
    -webkit-transform: translate3d(0, 15px, 0);
    transform: translate3d(0, 15px, 0);
    -webkit-transition: opacity 0.45s ease-out, -webkit-transform 0.45s ease-out;
    transition: opacity 0.45s ease-out, transform 0.45s ease-out;
    will-change: opacity, transform;
  }
  .sr.sr-visible {
    opacity: 1 !important;
    -webkit-transform: translate3d(0, 0, 0) !important;
    transform: translate3d(0, 0, 0) !important;
  }
  /* All stagger delays collapse to 0 on mobile */
  .sr-d1, .sr-d2, .sr-d3,
  .sr-d4, .sr-d5, .sr-d6 {
    -webkit-transition-delay: 0ms !important;
    transition-delay: 0ms !important;
  }
}

/* Desktop stagger — sequential 80ms cadence */
@media (min-width: 768px) {
  .sr-d1 { animation-delay:  80ms; }
  .sr-d2 { animation-delay: 160ms; }
  .sr-d3 { animation-delay: 240ms; }
  .sr-d4 { animation-delay: 320ms; }
  .sr-d5 { animation-delay: 400ms; }
  .sr-d6 { animation-delay: 480ms; }
}

// 1. React Hooks & Component Hoisting
const { useState, useEffect, useRef, useCallback, useMemo, Fragment } = React;
Object.assign(window, { useState, useEffect, useRef, useCallback, useMemo, Fragment });

// ── Responsive breakpoint hook ────────────────────────────────────────────────
// Returns true when viewport width ≤ bp. Reactive: updates on window resize.
// Used in all sections to bake mobile logic directly into style={{}} props,
// bypassing CSS specificity / Tailwind CDN interference entirely.
function useIsMobile(bp = 640) {
  const [is, setIs] = useState(() => window.innerWidth <= bp);
  useEffect(() => {
    const h = () => setIs(window.innerWidth <= bp);
    window.addEventListener('resize', h, { passive: true });
    return () => window.removeEventListener('resize', h);
  }, [bp]);
  return is;
}

// ── getDoctorBadges — infers credential micro-badges from doctor data ─────────
function getDoctorBadges(d) {
  const specBadges = {
    orthodontics: 'Invisalign Certified',
    implants:     'Straumann Partner',
    veneers:      'DSD Certified',
    whitening:    'Zoom Whitening',
    general:      'ทันตกรรมทั่วไป',
    pediatric:    'ทันตกรรมเด็ก',
  };
  const specs = (d.specialties || []).slice(0, 2).map(id => specBadges[id]).filter(Boolean);
  if (specs.length) return specs;
  // Fallback: infer from Thai role text
  const r = (d.roleTh || '').toLowerCase();
  if (r.includes('จัดฟัน')) return ['Invisalign Certified'];
  if (r.includes('ราก'))   return ['Straumann Partner'];
  if (r.includes('เด็ก'))  return ['ทันตกรรมเด็ก'];
  if (r.includes('สวยงาม') || r.includes('เวเนียร์')) return ['DSD Certified'];
  return [];
}

const SUPABASE_URL      = 'https://fessufmggqdpfatoibrp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Uj7973Ys4iFzqDig_08LBQ_9XQkM2ka';
const supabaseClient    = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const _SB_TABLE = 'site_config';
const _SB_ROW   = 'main';

// ── Storage: image upload ─────────────────────────────────────────────────────
async function uploadToSupabase(file, folder) {
  const ext      = file.name.split('.').pop().toLowerCase();
  const filePath = `${folder}/${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${ext}`;
  const { error } = await supabaseClient.storage
    .from('clinic-images')
    .upload(filePath, file, { upsert: false });
  if (error) { console.error('[Supabase upload]', error.message); return null; }
  const { data } = supabaseClient.storage.from('clinic-images').getPublicUrl(filePath);
  return data.publicUrl;
}

// ── Database: read config ─────────────────────────────────────────────────────
// Returns the parsed payload object on success, or null when:
//   • the table row does not exist yet (first-run before any admin save)
//   • network is unreachable
//   • RLS blocks the read
// In all null cases the caller falls back to its localStorage cache — this is
// logged explicitly so there is no silent fallback.
async function loadSiteConfigFromSupabase() {
  try {
    const { data, error } = await supabaseClient
      .from(_SB_TABLE)
      .select('payload')
      .eq('id', _SB_ROW)
      .maybeSingle();
    if (error) {
      console.warn('[We Smile sync] Supabase read error — falling back to localStorage:', error.message);
      return null;
    }
    if (!data) {
      console.info('[We Smile sync] site_config row absent — using localStorage cache until first admin save.');
      return null;
    }
    console.info('[We Smile sync] Remote config loaded from Supabase ✓');
    return data.payload;
  } catch (e) {
    console.warn('[We Smile sync] Network exception on read — falling back to localStorage:', e.message);
    return null;
  }
}

// ── Database: write config ────────────────────────────────────────────────────
// Upserts the full webData payload into site_config id='main'.
// Returns true on success, false on any error.
// The caller (onSave in App) is responsible for throwing when false is returned
// so that AdminDashboard.handleSave can surface the error to the admin UI.
async function saveSiteConfigToSupabase(payload) {
  try {
    const { error } = await supabaseClient
      .from(_SB_TABLE)
      .upsert(
        { id: _SB_ROW, payload, updated_at: new Date().toISOString() },
        { onConflict: 'id' }
      );
    if (error) {
      console.error('[We Smile sync] Supabase write error:', error.message);
      return false;
    }
    console.info('[We Smile sync] Config saved to Supabase ✓');
    return true;
  } catch (e) {
    console.error('[We Smile sync] Network exception on write:', e.message);
    return false;
  }
}

// ── Database: fetch only updated_at for conflict detection ───────────────────
// Used by handleSave to perform an optimistic-lock check before writing.
async function fetchSiteConfigUpdatedAt() {
  try {
    const { data, error } = await supabaseClient
      .from(_SB_TABLE)
      .select('updated_at')
      .eq('id', _SB_ROW)
      .maybeSingle();
    if (error || !data) return null;
    return data.updated_at; // ISO string from Postgres TIMESTAMPTZ
  } catch (e) {
    return null; // network failure — skip conflict check, proceed with save
  }
}

// ── XSS sanitizer (security-hardening v1.0.0) ──────────────────
// Strips script injection patterns from any string value before it
// reaches React state or localStorage.
function sanitizeInput(val) {
  if (typeof val !== 'string') return val;
  return val
    .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
    .replace(/javascript\s*:/gi, '')
    .replace(/on\w+\s*=\s*["']?[^"'>]*/gi, '')
    .replace(/data\s*:\s*text\/html/gi, '');
}

// Sorts doctors by sort_order (then priority) ascending so that backend-assigned

    const ao = (a.sort_order != null ? a.sort_order : (a.priority != null ? a.priority : 999));
    const bo = (b.sort_order != null ? b.sort_order : (b.priority != null ? b.priority : 999));
    return ao - bo;
  });

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, label, children }) {

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, children, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{children || label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  const isMobileNav                   = useIsMobile(); // ≤ 640 px

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // Close mobile menu on any real navigation
  useEffect(() => {
    setMenuOpen(false);
  }, [active]);

  useEffect(() => {
    if (active !== 'home') setLocalActive(null);
  }, [active]);

  // Scroll-map anchors (doctors removed — now a view flip, not a scroll)
  const SCROLL_SECTION_IDS = new Set(['services', 'branches', 'cases', 'faq']);

  const handleClick = (id) => {
    setMenuOpen(false);

function PortfolioShowcase({ num, portfolioImages }) {
  const images = (portfolioImages || []).filter(Boolean);
  const [idx, setIdx] = useState(0);
  const total = images.length;
  if (total === 0) return null;
  const safeIdx = Math.min(idx, total - 1);
  const prev = () => setIdx(i => (i - 1 + total) % total);
  const next = () => setIdx(i => (i + 1) % total);
  return (
    <section id="section-cases" className="ws-section" style={{ background:'var(--ws-bone)' }}>
      <div className="container">
        {/* Header row */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:48, flexWrap:'wrap', gap:24 }}>
          <div>
            {num != null && (
              <div className="ws-num" style={{ marginBottom:16 }}>
                {String(num).padStart(2,'0')} / 07 {'—'} Real Results
              </div>
            )}
            <h2 className="ws-h2" style={{ margin:0 }}>
              {'ผลงานเคสจากคลินิกของเรา'}
            </h2>
            <p style={{ margin:'8px 0 0', font:'400 12px/1.6 var(--ws-font-sans)', color:'var(--ws-fg-4)', maxWidth:560 }}>
              {'ภาพจากผู้ใช้บริการจริงที่ได้รับอนุญาตให้เผยแพร่ — ผลลัพธ์อาจแตกต่างกันในแต่ละบุคคล'}
            </p>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <span style={{ font:'600 13px/1 var(--ws-font-sans)', color:'var(--ws-fg-3)', marginRight:12 }}>
              {String(safeIdx + 1).padStart(2,'0')} / {String(total).padStart(2,'0')}
            </span>
            <button onClick={prev} className="btn btn-ghost" style={{ padding:12, width:44, height:44 }}>
              <i data-lucide="arrow-left" style={{ width:16, height:16 }}></i>
            </button>
            <button onClick={next} className="btn btn-ghost" style={{ padding:12, width:44, height:44 }}>
              <i data-lucide="arrow-right" style={{ width:16, height:16 }}></i>
            </button>
          </div>
        </div>
        {/* Tightened image frame — max-w-2xl centred, responsive padding */}
        <div style={{ padding:'0 8px' }}>
        <div className="sk" style={{ position:'relative', borderRadius:28, overflow:'hidden', width:'100%', maxWidth:672, margin:'0 auto', aspectRatio:'4/3', boxShadow:'0 24px 64px rgba(15,23,42,0.22), 0 4px 16px rgba(15,23,42,0.10)' }}>
          <img key={safeIdx} src={images[safeIdx]} alt={'ผลงาน ' + (safeIdx + 1)} loading="lazy"
            onLoad={e => {
              e.target.style.opacity = '1';
              const p = e.target.parentNode;
              if (p) {
                p.classList.remove('sk');     // stops skeleton shimmer only
                p.style.background = '#111';  // restore dark bg for failed-load safety
              }
            }}
            style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', opacity:0, transition:'opacity 0.5s cubic-bezier(0.4,0,0.2,1)' }} />
          {/* Dot nav */}
          <div style={{ position:'absolute', bottom:20, left:'50%', transform:'translateX(-50%)', display:'flex', gap:8, zIndex:2 }}>
            {images.map((_, i) => (
              <button key={i} onClick={() => setIdx(i)}
                style={{ width: i === safeIdx ? 26 : 8, height:8, borderRadius:999, border:'none', cursor:'pointer', padding:0,
                         background: i === safeIdx ? '#fff' : 'rgba(255,255,255,0.38)',
                         transition:'width 0.32s ease, background 0.25s ease' }} />
            ))}
          </div>
        </div>
        </div>
      </div>
    </section>
  );
}

// Before/after with optional drag-to-reveal slider
function BeforeAfter({ before, after }) {
  const [pct, setPct] = useState(50);
  const ref = useRef(null);
  const draggingRef = useRef(false);

  const move = (clientX) => {
    const el = ref.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const p = Math.min(100, Math.max(0, ((clientX - r.left) / r.width) * 100));
    setPct(p);
  };
  const start = (e) => {
    draggingRef.current = true;
    move(e.clientX || e.touches?.[0]?.clientX);
  };
  const onMove = (e) => {
    if (!draggingRef.current) return;
    move(e.clientX || e.touches?.[0]?.clientX);
  };
  const stop = () => { draggingRef.current = false; };

  useEffect(() => {
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', stop);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('touchend', stop);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', stop);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', stop);
    };
  }, []);

  return (
    <div ref={ref}
      onMouseDown={start} onTouchStart={start}
      style={{
        position: 'absolute', inset: 0,
        cursor: 'ew-resize', userSelect: 'none',
        background: '#000',
      }}>
      {/* After (full bleed below) */}
      <img src={after} alt={'หลังการรักษา'} draggable="false" loading="lazy"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }}
      />
      {/* Before (clipped on top) */}
      <div style={{ position: 'absolute', inset: 0, width: `${pct}%`, overflow: 'hidden' }}>
        <img src={before} alt={'ก่อนการรักษา'} draggable="false" loading="lazy"
          style={{ position: 'absolute', left: 0, top: 0, height: '100%', width: ref.current?.offsetWidth || '100%', objectFit: 'cover' }}
        />
      </div>

      {/* Labels */}
      <div style={{
        position: 'absolute', left: 18, top: 18,
        background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)',
        color: '#fff', padding: '6px 12px', borderRadius: 999,
        font: '700 11px/1 var(--ws-font-sans)', letterSpacing: '0.12em', textTransform: 'uppercase',
      }}>
        {'ก่อน'}
      </div>
      <div style={{
        position: 'absolute', right: 18, top: 18,
        background: 'var(--ws-primary)',
        color: '#fff', padding: '6px 12px', borderRadius: 999,
        font: '700 11px/1 var(--ws-font-sans)', letterSpacing: '0.12em', textTransform: 'uppercase',
      }}>
        {'หลัง'}
      </div>

      {/* Divider line + handle */}
      <div style={{
        position: 'absolute', top: 0, bottom: 0, left: `${pct}%`,
        width: 2, background: '#fff', boxShadow: '0 0 0 1px rgba(0,0,0,0.15)',
        pointerEvents: 'none',
      }}>
        <div style={{
          position: 'absolute', top: '50%', left: '50%',
          transform: 'translate(-50%, -50%)',
          width: 44, height: 44, borderRadius: '50%',
          background: '#fff', boxShadow: 'var(--ws-shadow-lg)',
          display: 'grid', placeItems: 'center',
          color: 'var(--ws-primary)',
        }}>
          <i data-lucide="chevrons-left-right" style={{ width: 20, height: 20 }}></i>
        </div>
      </div>

      {/* Hint */}
      <div style={{
        position: 'absolute', bottom: 18, left: '50%', transform: 'translateX(-50%)',
        background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(8px)',
        padding: '8px 14px', borderRadius: 999,
        font: '500 11px/1 var(--ws-font-sans)', color: 'var(--ws-fg-3)',
        letterSpacing: '0.04em',
      }}>
        {'ลากเพื่อเปรียบเทียบ'}
      </div>
    </div>
  );
}

// Schedule Matrix — calendar grid for current month
// ============================================================
function ScheduleMatrix({ doctor }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const [view, setView] = useState({ y: today.getFullYear(), m: today.getMonth() });

  const monthName = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'][view.m];
  const dows = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  const dayKeys = ['sun','mon','tue','wed','thu','fri','sat'];

  const prev = () => setView(v => v.m === 0 ? { y: v.y - 1, m: 11 } : { y: v.y, m: v.m - 1 });
  const next = () => setView(v => v.m === 11 ? { y: v.y + 1, m: 0 } : { y: v.y, m: v.m + 1 });

  // For each date in this month, find if doctor works there and at which branch
  const firstDay = new Date(view.y, view.m, 1);
  const lastDay = new Date(view.y, view.m + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();

  const safeSchedule = doctor.schedule || [];

  // Map dayIndex (1..n) → {branch, day, weekOfMonth} or null
  function dateMatches(dayNum) {
    const date = new Date(view.y, view.m, dayNum);
    const dayKey = dayKeys[date.getDay()];
    // Week of month: 1..5 based on which occurrence of this weekday it is
    const weekOfMonth = Math.ceil(dayNum / 7);
    const matches = safeSchedule.filter(s => s.day === dayKey && s.weeks.includes(weekOfMonth));
    return matches;
  }

  // Build cells
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  // Branch color map
  const branchPalette = {
    ladkrabang: { bg: 'var(--ws-orange-100)', fg: 'var(--ws-orange-700)', dot: 'var(--ws-primary)' },
    suvarnabhumi: { bg: 'var(--ws-navy-100)', fg: 'var(--ws-navy-800)', dot: 'var(--ws-navy-700)' },
    romklao: { bg: '#E8F4F0', fg: '#1F6B53', dot: '#2A8D6E' },
    onnut: { bg: '#F4E8E8', fg: '#8B2A2A', dot: '#B83E3E' },
  };

  return (
    <div style={{ background: '#fff', borderRadius: 32, overflow: 'hidden', boxShadow: 'var(--ws-shadow-md)', border: '1px solid var(--ws-line)' }}>
      {/* Header bar with month + legend */}
      <div style={{
        padding: '24px 32px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 24, flexWrap: 'wrap',
        borderBottom: '1px solid var(--ws-line)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <button onClick={prev} className="btn btn-ghost" style={{ padding: 10, width: 38, height: 38 }} aria-label="Previous month">
            <i data-lucide="chevron-left" style={{ width: 16, height: 16 }}></i>
          </button>
          <div style={{ font: '500 26px/1 var(--ws-font-display)', color: 'var(--ws-fg-1)', letterSpacing: '-0.02em', minWidth: 220, textAlign: 'center' }}>
            {monthName} {view.y}
          </div>
          <button onClick={next} className="btn btn-ghost" style={{ padding: 10, width: 38, height: 38 }} aria-label="Next month">
            <i data-lucide="chevron-right" style={{ width: 16, height: 16 }}></i>
          </button>
        </div>

        {/* Branch legend */}
        <div style={{ display: 'flex', gap: 18, flexWrap: 'wrap' }}>
          {[...new Set(safeSchedule.map(s => s.branch))].map(branchId => {
            const b = getBranch(branchId);
            if (!b) return null;
            const p = branchPalette[branchId] || branchPalette.ladkrabang;
            return (
              <div key={branchId} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ width: 12, height: 12, borderRadius: 4, background: p.dot, display: 'inline-block' }}></span>
                <span style={{ font: '600 13px/1 var(--ws-font-sans)', color: 'var(--ws-fg-2)' }}>
                  {b.nameTh}
                </span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Calendar grid */}
      <div style={{ padding: '24px 32px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 8, marginBottom: 8 }}>
          {dows.map(d => (
            <div key={d} style={{ textAlign: 'center', font: '700 11px/1 var(--ws-font-sans)', color: 'var(--ws-fg-4)', letterSpacing: '0.08em', textTransform: 'uppercase', padding: '8px 0' }}>
              {d}
            </div>
          ))}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 8 }}>
          {cells.map((d, idx) => {
            if (!d) return <div key={idx} />;
            const date = new Date(view.y, view.m, d);
            const isPast = date < today;
            const matches = dateMatches(d);
            const isToday = date.getTime() === today.getTime();

            if (matches.length === 0) {
              return (
                <div key={idx} style={{
                  aspectRatio: '1',
                  borderRadius: 12,
                  background: 'var(--ws-cloud)',
                  display: 'flex', flexDirection: 'column',
                  padding: '8px 10px',
                  opacity: isPast ? 0.4 : 0.8,
                  border: isToday ? '1.5px solid var(--ws-line-strong)' : 'none',
                }}>
                  <span style={{ font: '600 13px/1 var(--ws-font-sans)', color: 'var(--ws-fg-4)' }}>{d}</span>
                </div>
              );
            }

            const p = branchPalette[matches[0].branch] || branchPalette.ladkrabang;
            const b = getBranch(matches[0].branch);
            return (
              <div key={idx} style={{
                aspectRatio: '1',
                borderRadius: 12,
                background: p.bg,
                padding: '8px 10px',
                display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
                opacity: isPast ? 0.55 : 1,
                border: isToday ? `1.5px solid ${p.dot}` : 'none',
                position: 'relative',
                overflow: 'hidden',
              }}>
                <span style={{ font: '700 14px/1 var(--ws-font-sans)', color: p.fg }}>{d}</span>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                  <div style={{ font: '600 10px/1 var(--ws-font-sans)', color: p.fg, textTransform: 'uppercase', letterSpacing: '0.06em', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {b ? b.nameTh : matches[0].branch}
                  </div>
                  {matches.length > 1 && (
                    <div style={{ font: '500 9px/1 var(--ws-font-sans)', color: p.fg, opacity: 0.8 }}>
                      +{matches.length - 1} more
                    </div>
                  )}
                </div>
                <span style={{ position: 'absolute', right: 6, top: 6, width: 6, height: 6, borderRadius: '50%', background: p.dot }}></span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Summary list — recurring schedule */}
      <div style={{ borderTop: '1px solid var(--ws-line)', padding: '24px 32px', background: 'var(--ws-cloud)' }}>
        <div className="ws-eyebrow" style={{ marginBottom: 18 }}>
          {'ตารางประจำ'}
        </div>
        {safeSchedule.length === 0 && (
          <div style={{ font: '500 14px/1.6 var(--ws-font-sans)', color: 'var(--ws-fg-3)', padding: '8px 0' }}>
            {'ยังไม่มีตารางออกตรวจที่กำหนด'}
          </div>
        )}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: 16 }}>
          {[...new Set(safeSchedule.map(s => s.branch))].map(branchId => {
            const b = getBranch(branchId);
            if (!b) return null;
            const slots = safeSchedule.filter(s => s.branch === branchId);
            const p = branchPalette[branchId] || branchPalette.ladkrabang;
            return (
              <div key={branchId} style={{
                background: '#fff', borderRadius: 16, padding: 18,
                borderLeft: `4px solid ${p.dot}`,
              }}>
                <div style={{ font: '700 15px/1.2 var(--ws-font-sans)', color: 'var(--ws-fg-1)', marginBottom: 12 }}>
                  {b.nameTh}
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {slots.map((s, i) => (
                    <ScheduleSummaryRow key={i} slot={s} />
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ScheduleSummaryRow({ slot }) {
  const dayName = { mon: 'จันทร์', tue: 'อังคาร', wed: 'พุธ', thu: 'พฤหัสบดี', fri: 'ศุกร์', sat: 'เสาร์', sun: 'อาทิตย์' }[slot.day];
  const allWeeks = slot.weeks.length >= 4;
  const weekLabel = allWeeks
    ? 'ทุกสัปดาห์'
    : `สัปดาห์ที่ ${slot.weeks.join(', ')}`;

  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 12, font: '500 13px/1.4 var(--ws-font-sans)' }}>
      <span style={{ color: 'var(--ws-fg-1)', fontWeight: 600 }}>{dayName}</span>
      <span style={{ color: 'var(--ws-fg-3)' }}>{weekLabel}</span>
    </div>
  );
}

      }}>
      {/* Photo — skeleton wrapper prevents CLS; img fades in on load */}
      <div className="sk" style={{
        aspectRatio: '4/5',
        borderRadius: '24px 24px 0 0',
        overflow: 'hidden',
        position: 'relative',
        transform: hov ? 'scale(1.03)' : 'scale(1)',
        transition: 'transform 0.45s cubic-bezier(0.22,0.61,0.36,1)',
      }}>
        <img
          src={d.photo || 'assets/banner.jpg'}
          alt={d.nameTh || ''}
          loading="lazy"
          className={photoFilter}
          onLoad={e => {
            e.target.style.opacity = '1';
            const p = e.target.parentNode;
            if (p) {
              p.classList.remove('sk'); // stops skeleton shimmer only — never touches .sr ancestors
              p.style.background = 'transparent';
            }
          }}
          style={{
            position: 'absolute', inset: 0,
            width: '100%', height: '100%',
            objectFit: 'cover',
            objectPosition: d.photo ? 'center top' : `${20+i*22}% 35%`,
            opacity: 0,
            transition: 'opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1)',
          }}
        />
      </div>

      {/* Body */}
      <div style={{ padding:'16px 18px 20px' }}>
        {/* Role — uppercase tracking eyebrow */}
        <div style={{ font:'600 9.5px/1 var(--ws-font-sans)', color:'var(--ws-primary)', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:9 }}>
          {d.roleTh}
        </div>

        {/* Name — high-contrast, no-wrap */}
        <div style={{
          font: '700 clamp(14px,3.5vw,19px)/1.22 var(--ws-font-display)',
          color: 'var(--ws-fg-1)', letterSpacing:'-0.01em',
          whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
        }}>
          {d.nameTh}
        </div>

        {/* Credential line — split on newlines / em-dashes / spaced hyphens so long
            credential strings from the DB render as separate readable items */}
        {d.cred && (
          <div style={{ display:'flex', flexDirection:'column', gap:3, marginTop:7 }}>
            {d.cred.split(/\n|—| - /).map((s,i) => s.trim() ? (
              <span key={i} style={{ font:'500 10.5px/1.45 var(--ws-font-sans)', color:'var(--ws-fg-4)', display:'block' }}>
                {s.trim()}
              </span>
            ) : null)}
          </div>
        )}

        {/* Short education — split on newlines and em-dashes */}
        {d.shortEduTh && (
          <div style={{ display:'flex', flexDirection:'column', gap:4, marginTop:10, paddingTop:10, borderTop:'1px solid var(--ws-line)' }}>
            {d.shortEduTh.split(/\n|—/).map((line, li) => line.trim() ? (
              <span key={li} style={{ font:'400 11px/1.55 var(--ws-font-sans)', color:'var(--ws-fg-3)', display:'block' }}>
                {line.trim()}
              </span>
            ) : null)}
          </div>
        )}
      </div>
    </div>
  );
}

// ── PageReviewsSection — 05/07 ────────────────────────────────────────────
// Lens 1: Rich background texture, layered shadow stack, precise spacing ladder.
// Lens 2: cubic-bezier(0.4,0,0.2,1) on every transition — lift + fill on hover,
//         scale-down on press, fadeIn on slide change.
// Lens 3: 48×48 min touch targets, clamp() image heights, inertia swipe.
// Lens 4: Centred stage draws focus, dot + counter builds progress awareness.
function PageReviewsSection({ config }) {
  const cfg      = config || {};
  const images   = cfg.reviewImages || [];
  const isMobile = useIsMobile();
  const isTablet = useIsMobile(900);
  const [activeIdx, setActiveIdx] = useState(0);
  const touchStartX = useRef(null);

  if (images.length === 0) return null;

  const prev = () => setActiveIdx(i => (i === 0 ? images.length - 1 : i - 1));
  const next = () => setActiveIdx(i => (i === images.length - 1 ? 0 : i + 1));

  const onTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const onTouchEnd   = (e) => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (dx < -48) next();
    else if (dx > 48) prev();
    touchStartX.current = null;
  };

  // Circular nav button — 56px desktop / 48px mobile.
  // Hover: orange fill + 2px lift + shadow bloom. Press: scale(0.95).
  const ease = '0.22s cubic-bezier(0.4, 0, 0.2, 1)';
  const ArrowBtn = ({ onClick, icon }) => (
    <button
      onClick={onClick}
      style={{
        width: isMobile ? 48 : 56, height: isMobile ? 48 : 56,
        minWidth: isMobile ? 48 : 56,
        borderRadius: '50%',
        background: '#fff',
        border: '1.5px solid rgba(33,53,133,0.10)',
        color: 'var(--ws-fg-3)',
        cursor: 'pointer',
        display: 'grid', placeItems: 'center',
        flexShrink: 0,
        // Ambient + mid shadow
        boxShadow: '0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(33,53,133,0.09)',
        transition: `all ${ease}`,
        transform: 'translateY(0) scale(1)',
      }}
      onMouseEnter={e => Object.assign(e.currentTarget.style, {
        background:   'var(--ws-primary)',
        color:        '#fff',
        borderColor:  'transparent',
        boxShadow:    '0 2px 6px rgba(0,0,0,0.10), 0 10px 32px rgba(232,90,20,0.38)',
        transform:    'translateY(-2px) scale(1)',
      })}
      onMouseLeave={e => Object.assign(e.currentTarget.style, {
        background:  '#fff',
        color:       'var(--ws-fg-3)',
        borderColor: 'rgba(33,53,133,0.10)',
        boxShadow:   '0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(33,53,133,0.09)',
        transform:   'translateY(0) scale(1)',
      })}
      onMouseDown={e => { e.currentTarget.style.transform = 'translateY(0) scale(0.95)'; }}
      onMouseUp={e   => { e.currentTarget.style.transform = 'translateY(-2px) scale(1)'; }}>
      <i data-lucide={icon} style={{ width: isMobile ? 18 : 22, height: isMobile ? 18 : 22, strokeWidth: 2.5 }}></i>
    </button>
  );

  return (
    <section className="ws-section" style={{
      // Lens 1: layered background — dot grid over soft gradient
      background: [
        'radial-gradient(circle, rgba(33,53,133,0.09) 1px, transparent 1px) 0 0 / 26px 26px',
        'linear-gradient(160deg, #EEF1FB 0%, #F4F6FF 55%, #E8EEFF 100%)',
      ].join(', '),
      position: 'relative',
      overflow: 'hidden',
    }}>
      {/* Decorative ambient orbs — add depth without clutter */}
      <div style={{ position:'absolute', top:-140, right:-100, width:400, height:400, borderRadius:'50%', background:'radial-gradient(circle,rgba(232,90,20,0.07),transparent 68%)', filter:'blur(48px)', pointerEvents:'none' }} />
      <div style={{ position:'absolute', bottom:-80, left:-80, width:320, height:320, borderRadius:'50%', background:'radial-gradient(circle,rgba(33,53,133,0.08),transparent 68%)', filter:'blur(40px)', pointerEvents:'none' }} />

      <div className="container" style={{ position:'relative' }}>

        {/* Section header — Lens 1 spacing ladder */}
        <div style={{ marginBottom: isMobile ? 32 : 52 }}>
          <div className="ws-num" style={{ marginBottom: 18 }}>{'05 / 07 — รีวิวจากเพจ'}</div>
          <h2 className="ws-h2" style={{ margin:'0 0 14px', lineHeight:1.12, letterSpacing:'-0.02em', fontSize: isMobile ? 'clamp(26px,7vw,34px)' : undefined }}>
            {'รีวิวจากเพจ'}
            <em className="accent-fg" style={{ fontStyle:'italic' }}>{' Facebook'}</em>
          </h2>
          <p className="ws-lead" style={{ margin:0, maxWidth:520, lineHeight:1.72, fontSize: isMobile ? 15 : 17, color:'var(--ws-fg-3)' }}>
            {'ความประทับใจจากลูกค้าที่ติดต่อมาจากทางเฟสบุ๊กของเรา'}
          </p>
        </div>

        {/* Centred slider stage — max-width 740px on desktop */}
        <div style={{ maxWidth: isTablet ? '100%' : 740, margin:'0 auto' }}>

          {/* [←]  CARD  [→] — Lens 3: gap scales with breakpoint */}
          <div style={{ display:'flex', alignItems:'center', gap: isMobile ? 12 : 28 }}>
            {images.length > 1 && <ArrowBtn onClick={prev} icon="chevron-left" />}

            {/* Image card — Lens 1: three-layer shadow stack */}
            <div
              key={activeIdx}
              onTouchStart={onTouchStart}
              onTouchEnd={onTouchEnd}
              style={{
                flex: 1,
                borderRadius: isMobile ? 24 : 32,
                overflow: 'hidden',
                background: '#fff',
                // Layer 1: ambient, Layer 2: mid-range, Layer 3: close glow
                boxShadow: [
                  '0 1px 3px rgba(0,0,0,0.06)',
                  '0 8px 24px rgba(33,53,133,0.10)',
                  '0 32px 80px rgba(33,53,133,0.14)',
                ].join(', '),
                border: '1px solid rgba(33,53,133,0.07)',
                // Lens 2: cubic-bezier slide fade
                animation: `ws-fadeIn 0.38s cubic-bezier(0.4, 0, 0.2, 1) both`,
                userSelect: 'none',
              }}>
              <img
                src={images[activeIdx]}
                alt={`รีวิวที่ ${activeIdx + 1}`}
                loading="lazy"
                draggable={false}
                style={{
                  width: '100%',
                  // Lens 3: clamp height — responsive without breakpoints
                  height: isMobile ? 'clamp(300px, 72vw, 420px)' : 560,
                  objectFit: 'contain',
                  display: 'block',
                  background: '#f8fafc',
                }} />
            </div>

            {images.length > 1 && <ArrowBtn onClick={next} icon="chevron-right" />}
          </div>

          {/* Counter only — dots removed per client request */}
          {images.length > 1 && (
            <div style={{ display:'flex', justifyContent:'center', marginTop: isMobile ? 18 : 24 }}>
              <span style={{ font:'600 11px/1 var(--ws-font-sans)', color:'var(--ws-fg-4)', letterSpacing:'0.08em' }}>
                {String(activeIdx + 1).padStart(2,'0')} — {String(images.length).padStart(2,'0')}
              </span>
            </div>
          )}

        </div>
      </div>
    </section>
  );
}

const MONTH_NAMES_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_NAMES_TH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const DOW_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_TH = ['อา','จ','อ','พ','พฤ','ศ','ส'];

// Generates pseudo-random availability per date using a seeded approach
function getSlotsForDate(dateKey) {
  const all = ['09:00','10:00','11:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
  // hash of date string for deterministic "taken" slots
  let hash = 0;
  for (let i = 0; i < dateKey.length; i++) hash = (hash * 31 + dateKey.charCodeAt(i)) >>> 0;
  return all.map((t, i) => ({ time: t, taken: ((hash >> i) & 1) === 1 && i % 2 === 0 }));
}

function Calendar({ value, onChange }) {
  const [view, setView] = useState(() => {
    const t = new Date();
    return { y: t.getFullYear(), m: t.getMonth() };
  });
  const today = new Date();
  today.setHours(0,0,0,0);

  const monthNames = MONTH_NAMES_TH;
  const dowNames = DOW_TH;

  const firstDay = new Date(view.y, view.m, 1);
  const lastDay = new Date(view.y, view.m + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const prev = () => setView(v => v.m === 0 ? { y: v.y - 1, m: 11 } : { y: v.y, m: v.m - 1 });
  const next = () => setView(v => v.m === 11 ? { y: v.y + 1, m: 0 } : { y: v.y, m: v.m + 1 });

  return (
    <div style={{
      background: '#fff', border: '1px solid var(--ws-line)',
      borderRadius: 20, padding: 24,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
        <div style={{ font: '700 18px/1 var(--ws-font-sans)', color: 'var(--ws-fg-1)' }}>
          {monthNames[view.m]} {view.y}
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button onClick={prev} className="cal-day" style={{ width: 36, height: 36, border: '1px solid var(--ws-line)' }}>
            <i data-lucide="chevron-left" style={{ width: 16, height: 16 }}></i>
          </button>
          <button onClick={next} className="cal-day" style={{ width: 36, height: 36, border: '1px solid var(--ws-line)' }}>
            <i data-lucide="chevron-right" style={{ width: 16, height: 16 }}></i>
          </button>
        </div>
      </div>
      <div className="cal-grid" style={{ marginBottom: 4 }}>
        {dowNames.map(d => <div key={d} className="cal-dow">{d}</div>)}
      </div>
      <div className="cal-grid">
        {cells.map((d, idx) => {
          if (!d) return <div key={idx}></div>;
          const date = new Date(view.y, view.m, d);
          const isPast = date < today;
          const key = `${view.y}-${view.m}-${d}`;
          const isSelected = value && value.y === view.y && value.m === view.m && value.d === d;
          const isToday = date.getTime() === today.getTime();
          const cls = ['cal-day'];
          if (isPast) cls.push('cal-day-disabled');
          if (isSelected) cls.push('cal-day-selected');
          if (isToday) cls.push('cal-day-today');
          return (
            <button key={idx} className={cls.join(' ')} disabled={isPast}
              onClick={() => onChange({ y: view.y, m: view.m, d })}>
              {d}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function Step({ n, active, done, label, detail, last }) {
  return (
    <div style={{
      display: 'flex', gap: 12, alignItems: 'flex-start',
      paddingBottom: last ? 0 : 16, marginBottom: last ? 0 : 16,
      borderBottom: last ? '0' : '1px solid var(--ws-line)',
    }}>
      <div style={{
        width: 28, height: 28, borderRadius: '50%',
        background: done ? 'var(--ws-primary)' : (active ? 'var(--ws-primary)' : 'var(--ws-cloud)'),
        color: (done || active) ? '#fff' : 'var(--ws-fg-4)',
        display: 'grid', placeItems: 'center',
        font: '700 12px/1 var(--ws-font-sans)', flex: 'none',
      }}>
        {done ? <i data-lucide="check" style={{ width: 14, height: 14 }}></i> : n}
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ font: '600 13px/1 var(--ws-font-sans)', color: active ? 'var(--ws-fg-1)' : 'var(--ws-fg-3)' }}>{label}</div>
        <div style={{ font: '500 12px/1.4 var(--ws-font-sans)', color: 'var(--ws-fg-4)', marginTop: 5, textWrap: 'pretty' }}>{detail}</div>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <span style={{ font: '600 12px/1 var(--ws-font-sans)', color: 'var(--ws-fg-3)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>{label}</span>
      {children}
    </label>
  );
}

// Routes supported (via setScreen string):
//   'home', 'services', 'doctors', 'branches', 'about', 'booking', 'contact'
//   'service:<id>'             — service category drill-down
//   'service:<id>/<subId>'     — sub-service detail
//   'doctor:<id>'              — doctor profile

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "emphasis": "orange",
  "density": "default",
  "photoTreatment": "warm"
}/*EDITMODE-END*/;

function parseRoute(screen) {
  if (!screen) return { kind: 'home' };
  if (screen.startsWith('service:')) {
    const rest = screen.slice('service:'.length);
    const [cat, sub] = rest.split('/');
    if (sub) return { kind: 'subservice', categoryId: cat, subId: sub };
    return { kind: 'servicecat', categoryId: cat };
  }
  if (screen.startsWith('doctor:')) {
    return { kind: 'doctor', doctorId: screen.slice('doctor:'.length) };
  }
  return { kind: screen };
}

function navActiveId(screen) {
  if (!screen) return 'home';
  if (screen.startsWith('service')) return 'services';
  if (screen.startsWith('doctor')) return 'doctors';
  return screen;
}

function AdminDashboard({ isOpen, onClose, webData, onSave, onPreview }) {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [formData, setFormData] = useState(() => JSON.parse(JSON.stringify(webData)));
  const [selectedBranchIdx, setSelectedBranchIdx] = useState(0);
  const [selectedDoctorIdx, setSelectedDoctorIdx] = useState(0);
  const [selectedServiceIdx, setSelectedServiceIdx] = useState(0);
  // Debounce flag — prevents rapid-fire multi-save spam (security-hardening v1.0.0)
  const [isSaving, setIsSaving] = useState(false);
  const [saveStatus, setSaveStatus] = useState('idle'); // 'idle' | 'saving' | 'ok' | 'error'
  const [saveConflict, setSaveConflict] = useState(false); // true when another device wrote first
  const [isUploading, setIsUploading] = useState(false);
  const [isReviewUploading, setIsReviewUploading] = useState(false); // upload-in-progress flag for review images

  // Uploads a review image file to Supabase Storage → appends public URL to formData
  const handleReviewFileUpload = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setIsReviewUploading(true);
    try {
      const ext      = file.name.split('.').pop().toLowerCase();
      const filePath = `reviews/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
      const { error: upErr } = await supabaseClient.storage
        .from('clinic-images')
        .upload(filePath, file, { upsert: false });
      if (upErr) { console.error('[Review upload]', upErr.message); return; }
      const { data: urlData } = supabaseClient.storage.from('clinic-images').getPublicUrl(filePath);
      const publicUrl = urlData.publicUrl;
      if (publicUrl) {
        setFormData(p => ({
          ...p,
          config: { ...p.config, reviewImages: [...(p.config.reviewImages || []), publicUrl] },
        }));
      }
    } catch (_e) {
      console.error('[Review upload]', _e.message);
    } finally {
      setIsReviewUploading(false);
      e.target.value = ''; // reset so the same file can be re-selected if needed
    }
  };

  // ── Dashboard open: fetch latest Supabase state ───────────────────────────
  // TWO things happen on every dashboard mount:
  // 1. Capture updated_at for the optimistic-lock conflict check.
  // 2. Re-hydrate formData from the canonical Supabase row so that Admin B
  //    never overwrites Admin A's work with a stale localStorage snapshot.
  //    This closes the race window where formData was initialised from
  //    localStorage before the page-level Supabase hydration effect finished.
  const mountedAtRef = useRef(null);
  useEffect(() => {
    fetchSiteConfigUpdatedAt().then(ts => { mountedAtRef.current = ts; });

    loadSiteConfigFromSupabase().then(remote => {
      if (!remote) return; // empty table or network error — keep current formData
      setFormData(prev => {
        const _docDef = { specialties: [], schedule: [], showPortfolio: false, portfolioImages: [], shortEduTh: '' };
        const docs    = (remote.doctors || prev.doctors || []).map(d => ({ ..._docDef, ...d }));
        return {
          ...prev,
          ...remote,
          doctors: docs,
          config: { ...(prev.config || {}), ...(remote.config || {}) },
        };
      });
    });
  }, []); // runs exactly once when the dashboard mounts

  // ── Login gatekeeper state ──────────────────────────────────────────────
  // isLoggedIn is stored in sessionStorage so it survives component unmounts
  // (the dashboard closes after every save, but the session must stay alive).
  const [isLoggedIn,  setIsLoggedIn]  = useState(() => sessionStorage.getItem('wsdc_admin_auth') === '1');
  const [loginUser,   setLoginUser]   = useState('');
  const [loginPass,   setLoginPass]   = useState('');
  const [loginError,  setLoginError]  = useState('');
  const [showPass,    setShowPass]    = useState(false);

  const handleLogin = (e) => {
    e.preventDefault();
    if (loginUser === 'wesmile' && loginPass === 'admin1234') {
      sessionStorage.setItem('wsdc_admin_auth', '1'); // persist across unmounts
      setIsLoggedIn(true);
      setLoginError('');
    } else {
      setLoginError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
    }
  };

  const handleSave = async () => {
    if (isSaving) return;
    setIsSaving(true);
    setSaveStatus('saving');
    setSaveConflict(false);
    try {
      // ── Optimistic-lock check ──────────────────────────────────────────────
      const latestTs = await fetchSiteConfigUpdatedAt();
      if (latestTs && mountedAtRef.current && latestTs !== mountedAtRef.current) {
        console.warn('[Admin] Conflict — DB updated_at:', latestTs, '| local:', mountedAtRef.current);
        setSaveStatus('error');
        setIsSaving(false);
        setSaveConflict(true);
        setTimeout(() => { setSaveStatus('idle'); setSaveConflict(false); }, 7000);
        return;
      }

      // ── Hardcoded testimonials fallback ─────────────────────────────────────
      // Ensures the 3 real reviews always reach Supabase even if formData.testimonials
      // is stale or empty due to a local-state issue.
      const TESTIMONIALS_FALLBACK = [

      testimonialsTitle:   'ความประทับใจ จากลูกค้าของเรา',
      reviewImages:        [], // Screenshot URLs from Facebook/Google reviews — rendered as slider
      /* ── CTA Band ── */
      ctaEyebrow: 'ปรึกษาคุณหมอ',
      ctaTitle1:  'ปรึกษาฟรี',
      ctaTitle2:  '',
      ctaLead:    'บอกเป้าหมายรอยยิ้มของคุณ — เราจะอธิบายตัวเลือกทุกแบบ พร้อมราคา',
      ctaCta1:    'นัดหมายเลย',
      ctaLineText: '',
      ctaLineHref: '',
      /* ── Contact & Footer ── */
      contactBranchName: 'ลาดกระบัง',
      contactSubtext:    'มีที่จอดรถฟรี — ใกล้สนามบินสุวรรณภูมิ',
      contactAddress:    '222/15 ถนนหลวงแพ่ง แขวงทับยาว เขตลาดกระบัง กรุงเทพฯ 10520',
      contactHours:      'เปิดทุกวัน · 09:00 — 20:00',
      contactHoursNote:  'รวมวันหยุดราชการส่วนใหญ่',
      footerSlogan:      'คลินิกทันตกรรมครบวงจร ทำฟัน จัดฟัน รากฟันเทียม ฟันปลอม ครอบฟัน ฟอกสีฟัน รักษาโรคเหงือก ทันตกรรมเด็ก',
      doctor_section_helper_text: 'แตะที่บัตรแพทย์เพื่อดูประวัติและตัวอย่างเคส',
      meta_description_text: 'คลินิกทันตกรรมครบวงจร',
      socialFacebook:    'https://facebook.com/wesmiledental1',
      socialInstagram:   'https://instagram.com/wesmiledentalclinic',
      socialTikTok:      'https://tiktok.com/@wesmiledent',
      socialLine:        'https://line.me/ti/p/@wesmiledc1',
      /* ── Legacy fields kept for safety ── */
      heroTitleEn: '', heroTitleTh: '', heroLeadEn: '', heroLeadTh: '',
    }
  };
  try {
    const _ls = localStorage.getItem('wsdc_webdata');
    if (_ls) {
      const _p = JSON.parse(_ls);
      const _docDefaults = { specialties: [], schedule: [], showPortfolio: false, portfolioImages: [], shortEduTh: '' };
      const normalizedDoctors = sortDoctors((_p.doctors || _def.doctors).map((d, i) => ({ ..._docDefaults, sort_order: i, ...d })));
      return { ..._def, ..._p, doctors: normalizedDoctors, config: { ..._def.config, ...(_p.config || {}) } };
    }
  } catch (_e) { /* corrupted — fall through to defaults */ }
  return _def;
});
  window.PORTFOLIO_IMAGES = webData.portfolioImages;
  window.BRANCHES = webData.branches;
  window.SERVICES = webData.services;
  window.DOCTORS = webData.doctors;
  window.TESTIMONIALS = webData.testimonials;
  window.CLINIC_CONFIG = webData.config;
  const [isAdminOpen, setIsAdminOpen] = React.useState(false);
  const [pendingScroll, setPendingScroll] = React.useState(null);
  // 'home' = normal landing page; 'doctors' = dedicated all-doctors view
  const [currentView, setCurrentView] = React.useState('home');

  // 'doctors' removed from SCROLL_MAP — it now flips to the dedicated view
  const SCROLL_MAP = { services: 'section-services', cases: 'section-testimonials', branches: 'section-branches', faq: 'section-faq' };

  const onNav = (id) => {
    // Flip to dedicated doctors view — no screen change, no scroll
    if (id === 'doctors') {
      setCurrentView('doctors');
      window.scrollTo({ top: 0, behavior: 'auto' });
      return;
    }

    // Track whether we're leaving the AllDoctorsView before resetting it
    const leavingDoctorsView = currentView !== 'home';

    // Any other nav resets the dedicated view back to home
    setCurrentView('home');

    const anchorId = SCROLL_MAP[id];
    if (anchorId) {
      if (leavingDoctorsView) {
        // DOM hasn't updated yet — schedule scroll to fire after re-render.
        // setPendingScroll + the existing useEffect([pendingScroll, screen])
        // guarantees the element exists before scrollIntoView fires.
        setPendingScroll(anchorId);
      } else if (screen === 'home' || screen === null || screen === '') {
        const el = document.getElementById(anchorId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        setScreen('home');
        setPendingScroll(anchorId);
      }
    } else if (id === 'home') {
      if (screen === 'home' || screen === null || screen === '') {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        setScreen('home');
      }
    } else {
      setScreen(id);
    }
  };

  React.useEffect(() => { window.toggleAdminDashboard = () => setIsAdminOpen(prev => !prev); }, []);
  React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  // ── Scroll-reveal: fires on ALL screen sizes, no width gate ──────────────────
  // threshold:0  → fires the instant ANY pixel of the element enters the viewport
  // rootMargin:0 → no inset; works on short phone screens where -36px killed triggers
  React.useEffect(() => {
    if (typeof IntersectionObserver === 'undefined') return;
    const io = new IntersectionObserver(
      entries => entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('sr-visible'); io.unobserve(e.target); }
      }),
      { threshold: 0, rootMargin: '0px 0px 0px 0px' }
    );
    const scan = () => document.querySelectorAll('.sr:not(.sr-visible)').forEach(el => io.observe(el));
    scan();
    const t1 = setTimeout(scan, 400);   // catch elements rendered by React after first paint
    const t2 = setTimeout(scan, 1200);  // catch lazy-loaded sections on slow connections
    return () => { io.disconnect(); clearTimeout(t1); clearTimeout(t2); };
  });

  // ── seo-analytics-pro v1.0.0 — Dynamic OG tags + JSON-LD from CMS config ──
  React.useEffect(() => {
    const cfg = webData.config || {};
    const title = cfg.clinicName || 'We Smile Dental Clinic';
    const desc  = cfg.meta_description_text || cfg.footerSlogan || 'คลินิกทันตกรรมครบวงจร';
    const img   = cfg.heroImage    || 'assets/hero.webp';

    document.title = title;

    const setMeta = (attr, key, val) => {
      let el = document.querySelector(`meta[${attr}="${key}"]`);
      if (!el) { el = document.createElement('meta'); el.setAttribute(attr, key); document.head.appendChild(el); }
      el.setAttribute('content', val);
    };
    setMeta('property', 'og:title',       title);
    setMeta('property', 'og:description', desc);
    setMeta('property', 'og:image',       img);
    setMeta('name',     'description',    desc);

    const schema = {
      '@context': 'https://schema.org',
      '@type':    'Dentist',
      name:        cfg.clinicName    || 'We Smile Dental Clinic',
      description: desc,
      telephone:   cfg.clinicPhone   || '063-879-8448',
      address: {
        '@type':          'PostalAddress',
        streetAddress:    cfg.contactAddress  || '222/15 ถนนหลวงแพ่ง แขวงทับยาว',
        addressLocality:  cfg.contactBranchName || 'ลาดกระบัง',
        addressRegion:    'กรุงเทพมหานคร',
        addressCountry:   'TH',
      },
      openingHours: cfg.contactHours  || 'Mo-Su 09:00-20:00',
      sameAs: [cfg.socialFacebook, cfg.socialInstagram, cfg.socialLine, cfg.socialTikTok].filter(Boolean),
      image: img,
    };
    const ldEl = document.getElementById('ws-jsonld');
    if (ldEl) ldEl.textContent = JSON.stringify(schema);
  }, [webData.config]);
  // Scroll to top on screen change, but skip when a pending anchor scroll is queued
  React.useEffect(() => {
    if (!pendingScroll) window.scrollTo({ top: 0, behavior: 'auto' });
  }, [screen]);
  // After home renders, execute the deferred anchor scroll then clear the queue
  React.useEffect(() => {
    if (pendingScroll && screen === 'home') {
      const el = document.getElementById(pendingScroll);
      if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
      setPendingScroll(null);
    }
  }, [pendingScroll, screen]);
  React.useEffect(() => {
    try { localStorage.setItem('wsdc_webdata', JSON.stringify(webData)); } catch (_e) {}
  }, [webData]);

  // ── Remote hydration ────────────────────────────────────────────────────────
  // Supabase site_config is the canonical data store.
  // localStorage is only a fast first-paint cache for the current device.
  // This effect pulls the remote row on every fresh page load so that desktop,
  // mobile, and iPad all render the exact same admin-saved configuration.
  // loadSiteConfigFromSupabase() logs explicitly on every code path — there is
  // no silent fallback; open DevTools console to verify sync status.
  React.useEffect(() => {
    loadSiteConfigFromSupabase().then(remote => {
      if (!remote) return; // null = empty table or network error (already logged inside helper)
      setWebData(prev => {
        const _docDef = { specialties: [], schedule: [], showPortfolio: false, portfolioImages: [], shortEduTh: '' };
        const docs    = sortDoctors((remote.doctors || prev.doctors || []).map((d, i) => ({ ..._docDef, sort_order: i, ...d })));
        return {
          ...prev,
          ...remote,
          doctors: docs,
          config:  { ...(prev.config || {}), ...(remote.config || {}) },
        };
      });
    });
  }, []); // intentional empty dep — runs exactly once on mount
  const photoFilter = 'photo-' + tweaks.photoTreatment;
  const densityClass = 'density-' + tweaks.density;
  const props = { onNav, photoFilter };
  const route = parseRoute(screen);
  // When the dedicated doctors view is active, highlight 'doctors' in the navbar pill
  const navActive = currentView === 'doctors' ? 'doctors' : navActiveId(screen);
  return (
    <div data-emphasis={tweaks.emphasis} className={densityClass}>
      <Navbar active={navActive} onNav={onNav} />

      {/* Dedicated doctors view overrides all route rendering */}
      {currentView === 'doctors' ? (
        <AllDoctorsView
          onNav={onNav}
          photoFilter={photoFilter}
          config={webData.config}
          doctors={webData.doctors}
        />
      ) : (
        <>
          {route.kind === 'home'       && <HomeScreen {...props} services={webData.services} config={webData.config} doctors={webData.doctors} testimonials={webData.testimonials} portfolioImages={webData.portfolioImages} branches={webData.branches} />}
          {route.kind === 'contact'    && <ContactScreen {...props} config={webData.config} branches={webData.branches} />}
          {route.kind === 'servicecat' && <ServiceCategoryScreen {...props} serviceId={route.categoryId} />}
          {route.kind === 'subservice' && <SubServiceScreen {...props} categoryId={route.categoryId} subId={route.subId} />}
          {route.kind === 'doctor'     && <DoctorProfileScreen {...props} doctorId={route.doctorId} doctors={webData.doctors} />}
        </>
      )}

      <Footer onNav={onNav} config={webData.config} />
      <MobileFloatingCTA onNav={onNav} />
      <TweaksPanel title="Tweaks">
        <TweakSection title="Color emphasis">
          <TweakRadio value={tweaks.emphasis} onChange={(v) => setTweak('emphasis', v)}
            options={[{ value: 'orange', label: 'Orange' }, { value: 'navy', label: 'Navy' }]} />
        </TweakSection>
        <TweakSection title="Density">
          <TweakRadio value={tweaks.density} onChange={(v) => setTweak('density', v)}
            options={[{ value: 'compact', label: 'Compact' }, { value: 'default', label: 'Default' }, { value: 'airy', label: 'Airy' }]} />
        </TweakSection>
        <TweakSection title="Photo treatment">
          <TweakRadio value={tweaks.photoTreatment} onChange={(v) => setTweak('photoTreatment', v)}
            options={[{ value: 'warm', label: 'Warm grade' }, { value: 'neutral', label: 'Neutral' }]} />
        </TweakSection>
        <TweakSection title="Quick navigation">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            {NAV_LINKS.map(l => (
              <TweakButton key={l.id} onClick={() => onNav(l.id)}>{l.label}</TweakButton>
            ))}
          </div>
        </TweakSection>
        <TweakSection title="Deep-link demos">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <TweakButton onClick={() => onNav('service:orthodontics')}>Service: Orthodontics</TweakButton>
            <TweakButton onClick={() => onNav('service:orthodontics/invisalign')}>Sub: Invisalign</TweakButton>
            <TweakButton onClick={() => onNav('service:implants/all-on-4')}>Sub: All-on-4</TweakButton>
            <TweakButton onClick={() => onNav('doctor:pichaya')}>Doctor: Pichaya</TweakButton>
            <TweakButton onClick={() => onNav('doctor:anusorn')}>Doctor: Anusorn</TweakButton>
          </div>
        </TweakSection>
      </TweaksPanel>
      {isAdminOpen && (
        <AdminDashboard
          isOpen={isAdminOpen}
          onClose={() => setIsAdminOpen(false)}
          webData={webData}
          onSave={async (newData) => {
            setWebData(newData);                                   // update in-memory state → triggers localStorage write
            const ok = await saveSiteConfigToSupabase(newData);   // push canonical copy to Supabase
            if (!ok) throw new Error('Supabase write failed');     // propagates to handleSave catch block
            // ↑ intentionally no setIsAdminOpen(false) here —
            //   handleSave calls onClose after showing the ✅ success tick
          }}
          onPreview={(doctorId, savedData) => {
            setWebData(savedData);
            setIsAdminOpen(false);
            setScreen('doctor:' + doctorId);
          }}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
